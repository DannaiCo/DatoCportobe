<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dato Cervecero Fijo</title>

 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Open+Sans:ital,wght@1,600&display=s… rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      width: 100%;
      height: 100%;
    }

    .pantalla {
      width: 2120px;
      height: 576px;
      position: absolute;
      left: 0;
      top: 0;
      background-image: url('fondo.png');
      background-size: cover;
      background-position: center;
      transform-origin: top left;
    }

    .contenedor-frase {
      position: absolute;
      top: 200px;
      left: 700px;
      width: 1200px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: rgba(255, 255, 255, 0);
    }

    #frase {
      font-size: 100px;
      color: white;
      font-family: "Dela Gothic One", sans-serif;
      font-weight: 400;
      letter-spacing: 2px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="pantalla" id="pantalla">
    <div class="contenedor-frase">
      <div id="frase">Cargando frase...</div>
    </div>
  </div>

  <script>
  const frases = [
    "Aún estás a tiempo de empezar de nuevo.",
"Perdonar también te libera.",
"Agradecer cambia el día.",
"Alguien necesita tu ayuda hoy.",
"Una palabra amable cambia el día.",
"Hoy puedes elegir la calma.",
"Lo simple también transforma.",
"Ayudar también te cambia.",
"Un momento de silencio ayuda.",
  ];

  let index = 0;
  const elemento = document.getElementById("frase");

  function cambiarFrase() {
    elemento.textContent = frases[index];
    index = (index + 1) % frases.length;
  }

  cambiarFrase();
  setInterval(cambiarFrase, 5000);

  function escalarPantalla() {
    const escalaX = window.innerWidth / 2120;
    const escalaY = window.innerHeight / 576;

    // 🔑 usar Math.max para hacer que llene toda la pantalla
    const escala = Math.max(escalaX, escalaY);

    document.getElementById("pantalla").style.transform = `scale(${escala})`;
  }

  window.addEventListener("resize", escalarPantalla);
  escalarPantalla();
</script>
</body>
</html>
